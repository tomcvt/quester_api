<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quester — Register</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      font-family: system-ui, sans-serif;
      color: #e2e8f0;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 2.5rem 2rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      color: #fff;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #94a3b8;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: #cbd5e1;
      margin-bottom: 0.375rem;
    }

    input {
      width: 100%;
      padding: 0.625rem 0.875rem;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.9375rem;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 1.125rem;
    }

    input:focus { border-color: #6366f1; }

    button {
      width: 100%;
      padding: 0.75rem;
      background: #6366f1;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.5rem;
    }

    button:hover { background: #4f46e5; }
    button:disabled { background: #3730a3; cursor: not-allowed; }

    .alt-link {
      margin-top: 1.25rem;
      text-align: center;
      font-size: 0.875rem;
      color: #94a3b8;
    }

    .alt-link a {
      color: #818cf8;
      text-decoration: none;
    }

    .alt-link a:hover { text-decoration: underline; }

    #error-msg {
      display: none;
      margin-top: 1rem;
      padding: 0.625rem 0.875rem;
      background: #2d1b1b;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      font-size: 0.875rem;
      color: #fca5a5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Quester</h1>
    <p class="subtitle">Create an account</p>

    <form id="register-form">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="new-password" required />

      <label for="confirm">Confirm password</label>
      <input id="confirm" name="confirm" type="password" autocomplete="new-password" required />

      <button type="submit" id="submit-btn">Create account</button>
    </form>

    <div id="error-msg"></div>

    <p class="alt-link">Already have an account? <a href="/login">Sign in</a></p>
  </div>

  <script>
    const form = document.getElementById('register-form');
    const btn  = document.getElementById('submit-btn');
    const err  = document.getElementById('error-msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.style.display = 'none';

      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      if (password !== confirm) {
        err.textContent = 'Passwords do not match.';
        err.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account…';

      const body = {
        username: document.getElementById('username').value,
        password,
      };

      try {
        const res = await fetch('/api/v1/auth/web/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
          redirect: 'follow',
        });

        if (res.ok || res.redirected) {
          window.location.href = res.url || '/';
        } else {
          const data = await res.json().catch(() => ({}));
          err.textContent = data.detail || 'Registration failed. Please try again.';
          err.style.display = 'block';
        }
      } catch {
        err.textContent = 'Network error. Please try again.';
        err.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
