<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quester — Register</title>
  <link rel="stylesheet" href="/shared.css" />
</head>
<body>
  <div class="card">
    <h1>Quester</h1>
    <p class="subtitle">Create an account</p>

    <form id="register-form">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="new-password" required />

      <label for="confirm">Confirm password</label>
      <input id="confirm" name="confirm" type="password" autocomplete="new-password" required />

      <button type="submit" id="submit-btn">Create account</button>
    </form>

    <div id="error-msg"></div>

    <p class="alt-link">Already have an account? <a href="/login">Sign in</a></p>
  </div>

  <script>
    const form = document.getElementById('register-form');
    const btn  = document.getElementById('submit-btn');
    const err  = document.getElementById('error-msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.style.display = 'none';

      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      if (password !== confirm) {
        err.textContent = 'Passwords do not match.';
        err.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account…';

      const body = {
        username: document.getElementById('username').value,
        password,
      };

      try {
        const res = await fetch('/api/v1/auth/web/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
          redirect: 'follow',
        });

        if (res.ok || res.redirected) {
          window.location.href = res.url || '/';
        } else {
          const data = await res.json().catch(() => ({}));
          err.textContent = data.detail || 'Registration failed. Please try again.';
          err.style.display = 'block';
        }
      } catch {
        err.textContent = 'Network error. Please try again.';
        err.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
